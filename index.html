let isPainting = false;

let currentStroke = new Set(); // 🔥 per slide memory

function paintBubble(bubble, row, col) {

  const id = bubble.dataset.id;

  // 🔥 DELETE MODE (ETO ANG BAGONG PART)
  if (isDeleting) {

    delete bubbleData[id];
    delete visualCache[id];
    delete specialValues[id];

    bubble.innerHTML = "";

    return;
  }

  // ===== ORIGINAL LOGIC =====
  if (!selectedCombo) return;

  if (currentStroke.has(id)) return;
  currentStroke.add(id);

  let layers = [...selectedCombo];

  let needsInput = false;

  layers.forEach(img => {
    if (img === "Dark Honeycomb.png" || img === "Honey Bee.png") {
      needsInput = true;
    }
  });

  if (needsInput) {
    let val = prompt("Enter honey amount:");
    if (val === null) return;

    specialValues[id] = {
      i: parseInt(val) || 0
    };
  }

  bubbleData[id] = {
    layers: layers
  };

  renderBubble(bubble, id);
}

function renderBubble(bubble, id) {

  bubble.innerHTML = "";

  if (!bubbleData[id]) return;

  bubbleData[id].layers.forEach((imgName, index) => {

    const img = document.createElement("img");
    const finalImg = getRandomVisual(imgName, id);
img.src = "./" + finalImg;

    img.style.position = "absolute";
    img.style.top = "0";
    img.style.left = "0";
    img.style.width = "100%";
    img.style.height = "100%";
    img.style.objectFit = "cover";
    img.style.borderRadius = "50%";
    img.style.zIndex = index + 1;

    bubble.appendChild(img);
  });
}

function buildGrid() {
grid = document.getElementById("grid");
grid.innerHTML = "";

const screenWidth = window.innerWidth;

// EXACT BUTTON POSITIONING
const btnWidth = screenWidth / 3;

document.getElementById("btn1").style.width = btnWidth + "px";
document.getElementById("btn1").style.left = "0px";

document.getElementById("btn2").style.width = btnWidth + "px";
document.getElementById("btn2").style.left = btnWidth + "px";

document.getElementById("btn3").style.width = btnWidth + "px";
document.getElementById("btn3").style.left = (btnWidth * 2) + "px";

const screenHeight = window.innerHeight;

// EXACT RULES
const SIZE = screenWidth / 11;
const VERTICAL_STEP = SIZE * 0.866;
const OFFSET = SIZE / 2;
const TOP_MARGIN = 30;

// DYNAMIC ROW COUNT
const rows = totalRows;

for (let row = 0; row < rows; row++) {
const isOdd = row % 2 === 1;

const cols = isOdd ? 10 : 11;
const offsetX = isOdd ? SIZE / 2 : 0;

for (let col = 0; col < cols; col++) {

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  
  const id = row + "_" + col;
bubble.dataset.id = id;

  // MOUSE DRAG
  bubble.addEventListener("mousedown", () => {
  isPainting = true;
  currentStroke.clear();
  paintBubble(bubble, row, col);
});

  bubble.addEventListener("mouseenter", () => {
    if (isPainting) {
      paintBubble(bubble, row, col);
    }
  });

  // TOUCH (MOBILE)
  bubble.addEventListener("touchstart", (e) => {

  e.preventDefault(); // 🔥 IMPORTANT (fix double trigger)

  isPainting = true;
  currentStroke.clear();

  paintBubble(bubble, row, col);
});

  bubble.addEventListener("touchmove", (e) => {
  
  e.preventDefault(); // 🔥 stops lag / double triggers
  
    const touch = e.touches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);

    if (el && el.classList.contains("bubble")) {
      const [r, c] = el.dataset.id.split("_").map(Number);
paintBubble(el, r, c);
    }
  });

  const x = offsetX + col * SIZE;
  const y = TOP_MARGIN + row * VERTICAL_STEP - scrollOffset;

  bubble.style.width = SIZE + "px";
  bubble.style.height = SIZE + "px";
  bubble.style.left = x + "px";
  bubble.style.top = y + "px";
  
  // 🔥 IMPORTANT: ibalik drawing galing data
if (bubbleData[id]) {
  renderBubble(bubble, id);
}

  grid.appendChild(bubble);
}

}
}

const totalHeight = 90 * VERTICAL_STEP;
const visibleHeight = window.innerHeight;

scrollOffset = percent * maxScroll;

buildGrid();

function setupDownloadButton() {

  }

  btn.addEventListener("click", function () {

    // 🔥 TEST (tanggalin later)
    console.log("DOWNLOAD CLICKED");

    if (!selectedGame) {
      alert("Pumili muna ng game!");
      return;
    }

    // 🔥 AUTO NAME (NO PROMPT, mas stable sa mobile)
    let name = "level_" + Date.now();

    // 🔥 BUILD DATA (SAME AS EXPORT)
    let gArray = buildExportData();
    let base = JSON.parse(LEVELS[selectedGame]);

    base.level.op = characterValue;

    base.level.g = gArray;

    const blob = new Blob([finalData], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");

    a.download = name + ".json";

    document.body.appendChild(a);
    a.click();

    setTimeout(() => URL.revokeObjectURL(url), 1000);

  });
}

if(typeof obj==="object"){
return "{"+Object.entries(obj).map(([k,v])=>k+":"+toBWS(v)).join(",")+"}";

return obj;

  if (visualCache[cellId] && visualCache[cellId][imgName]) {

  }

  const allowedColors = getAllowedColors();
  let pool = [];

  // 🔥 GROUPS (ETO ANG KEY FIX)
  const NORMAL_ORBS = [
    "Untitled1_20260402175652.png",
    "Untitled1_20260402175658.png",
    "Untitled1_20260402175704.png",
    "Untitled1_20260402175710.png",
    "Untitled1_20260402175716.png",
    "Untitled1_20260402175721.png"

    "Untitled1_20260405093631.png",

    "Untitled1_20260404230358.png",
    "Untitled1_20260404230404.png",
    "Untitled1_20260404230411.png"
  ];

  // ===== 🔥 AUTO-DETECT RANDOM =====

  // 🔹 NORMAL ORB GROUP
  if (NORMAL_ORBS.includes(imgName)) {

    // 👉 CHECK kung "random mode" (COLOR = 0)
    if (COLOR_MAP[imgName] === 0) {

      pool = NORMAL_ORBS.filter(n =>
        allowedColors.includes(COLOR_MAP[n])
      );

    } else {
      return imgName; // ✅ fixed color
    }
  }

  // 🔹 OWL GROUP
  else if (OWL_ORBS.includes(imgName)) {

    if (COLOR_MAP[imgName] === 0) {

      pool = OWL_ORBS.filter(n =>
        allowedColors.includes(COLOR_MAP[n])
      );

    } else {
      return imgName;
    }
  }

  // 🔹 FAIRY GROUP
  else if (FAIRY_ORBS.includes(imgName)) {

    if (COLOR_MAP[imgName] === 0) {

      pool = FAIRY_ORBS.filter(n =>
        allowedColors.includes(COLOR_MAP[n])
      );

    } else {
      return imgName;
    }
  }

  // 🔹 RANDOM DUO
  else if (imgName === "randomduobubble.png") {

    pool = Object.keys(DUO_MAP).filter(name => {

      if (name === "randomduobubble.png") return false;

      const duo = DUO_MAP[name];

      return (
        allowedColors.includes(duo.fc) &&
        allowedColors.includes(duo.sc)
      );
    });
  }

  // 🔹 RANDOM CHAMELEONS
  else if (imgName === "Random Chameleon.png") {

    pool = [
      "Red Chameleon.png",
      "Blue Chameleon.png",
      "Yellow Chameleon.png",
      "Green Chameleon.png",
      "Purple Chameleon.png"
    ].filter(name => {
      const color = {
        "Red Chameleon.png": 1,
        "Blue Chameleon.png": 2,
        "Yellow Chameleon.png": 3,
        "Green Chameleon.png": 4,
        "Purple Chameleon.png": 5
      }[name];

      return allowedColors.includes(color);
    });
  }

  else if (imgName === "Random Fairy Chameleon.png") {

    pool = [
      "Red Fairy Chameleon.png",
      "Blue Fairy Chameleon.png",
      "Yellow Fairy Chameleon.png",
      "Green Fairy Chameleon.png",
      "Purple Fairy Chameleon.png"
    ].filter(name => {
      const color = {
        "Red Fairy Chameleon.png": 1,
        "Blue Fairy Chameleon.png": 2,
        "Yellow Fairy Chameleon.png": 3,
        "Green Fairy Chameleon.png": 4,
        "Purple Fairy Chameleon.png": 5
      }[name];

      return allowedColors.includes(color);
    });
  }

  // 🔹 OTHER RANDOMS
  else if (imgName === "random_moreless.png") {
    pool = ["moreless_plus1.png", "moreless_minus1.png"];
  }

  else if (imgName === "random_dubblie.png") {
    pool = ["dubblie_left.png", "dubblie_right.png"];
  }

  // 🔹 DEFAULT
  else {
    return imgName;
  }

  // ===== FINAL PICK =====
  if (pool.length === 0) return imgName;

  const chosen = pool[Math.floor(Math.random() * pool.length)];

  if (!visualCache[cellId]) visualCache[cellId] = {};
  visualCache[cellId][imgName] = chosen;

  return chosen;
}

function buildExportData() {

  let entries = [];

  for (let key in bubbleData) {

    const [row, col] = key.split("_").map(Number);
    const cell = bubbleData[key];

    if (!cell || !cell.layers) continue;

    let blocks = [];

    cell.layers.forEach(imgName => {
    
    // 🔥 HONEY SYSTEM

if (imgName === "Honeycomb.png") {
  blocks.push({
    id: 59,
    p: { i: 0, p: 0 }
  });
  return;
}

if (imgName === "Dark Honeycomb.png") {
  const val = specialValues[key]?.i ?? 0;

  blocks.push({
    id: 59,
    p: { i: val, p: 1 }
  });
  return;
}

if (imgName === "Honey Bee.png") {
  const val = specialValues[key]?.i ?? 0;

  blocks.push({
    id: 60,
    p: { i: val }
  });
  return;
}

  // 🔥 DUO BUBBLE (HIGHEST PRIORITY)
  if (DUO_MAP[imgName]) {

    blocks.push({
      id: 31,
      p: DUO_MAP[imgName]
    });

    return;
  }

  // 🔥 SPECIAL EXPORT
  if (SPECIAL_EXPORT_MAP[imgName]) {

    const special = SPECIAL_EXPORT_MAP[imgName];

    if (special.b) {
      special.b.forEach(x => blocks.push(x));
    } else {
      blocks.push(special);
    }

    return;
  }

      const isBlocker = [
        "BUBBLEUPS 1.png",
        "BUBBLEUPS 2.png",
        "BUBBLEUPS 3.png"
      ].includes(imgName);

      const color = COLOR_MAP[imgName] ?? 0;
      const elementId = ELEMENT_TYPE_MAP[imgName];

      // 🔥 BLOCKERS (solo lang sila)
      if (isBlocker) {
        blocks.push({
          id: elementId
        });
        return;
      }

      // 🔥 ORB
      blocks.push({
        id: 0,
        p: { c: color }
      });

      // 🔥 ELEMENT (optional)
      if (elementId) {
        blocks.push({
          id: elementId
        });
      }

    });

    entries.push({
      b: blocks,
      p: [col, row]
    });
  }

  // SORT
  entries.sort((a, b) => {
    if (a.p[1] === b.p[1]) return a.p[0] - b.p[0];
    return a.p[1] - b.p[1];
  });

  return entries;
}

  if (scrollOffset > maxScroll) scrollOffset = maxScroll;

  buildGrid();
};
